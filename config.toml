[theme]
# Primary color for buttons and highlights (a trustworthy medical blue)
primaryColor = "#005b96"

# Background color for the main content area (clean white)
backgroundColor = "#ffffff"

# Background color for the sidebar (very light gray for contrast)
secondaryBackgroundColor = "#f4f6f9"

# Text color (dark gray for better readability than pure black)
textColor = "#333333"

# Font style (sans-serif is modern and clean)
font = "sans serif"
